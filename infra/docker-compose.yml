version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ai-postgres
    environment:
      POSTGRES_USER: ai
      POSTGRES_PASSWORD: ai_pass
      POSTGRES_DB: autoagent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ai -d autoagent" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ai-network

  redis:
    image: redis:7-alpine
    container_name: ai-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ai-network

  chromadb:
    image: chromadb/chroma:0.4.24
    container_name: ai-chromadb
    volumes:
      - chromadb_data:/chroma/chroma
    ports:
      - "8001:8000"
    environment:
      - IS_PERSISTENT=TRUE
    restart: unless-stopped
    networks:
      - ai-network

  # Mock/Local LLM services removed in favor of Host Ollama


  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ../backend/.env
    container_name: ai-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    environment:
      DATABASE_URL: "postgresql://ai:ai_pass@postgres:5432/autoagent"
      REDIS_URL: "redis://redis:6379/0"
      LOG_LEVEL: "INFO"
      SECRET_KEY: "your-secret-key-here-change-in-prod"
      LLAMA3_70B_URL: "http://ai-llama3-70b:8000/v1/chat/completions"
      LLAMA3_8B_URL: "http://ai-llama3-8b:8000/v1/chat/completions"
      CODE_LLAMA_34B_URL: "http://ai-code-llama-34b:8000/v1/completions"
      CODE_LLAMA_13B_URL: "http://ai-code-llama-13b:8000"
      MIXTRAL_URL: "http://ai-mixtral:8000/v1/chat/completions"
      SDXL_URL: "http://host.docker.internal:7860"
      GOOGLE_CLIENT_ID: "865977900238-r7f30jut8cuk92k66st54293b3glaku8.apps.googleusercontent.com"
      CHROMA_URL: "http://chromadb:8000"
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
      - sandbox_data:/sandbox
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    networks:
      - ai-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: ai-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
      - "5173:5173"
    volumes:
      - C:/Users/gugul/Desktop/Self-Hosted Generative AI Chatbot/frontend:/app
      - /app/node_modules
    restart: unless-stopped
    networks:
      - ai-network

  sandbox:
    build:
      context: ../sandbox
      dockerfile: Dockerfile.sandbox
    container_name: ai-sandbox
    environment:
      MAX_MEMORY: "512M"
      TIMEOUT: "30"
    volumes:
      - sandbox_data:/sandbox
    restart: unless-stopped
    networks:
      - ai-network

volumes:
  postgres_data:
  chromadb_data:
  huggingface_models:
  sandbox_data:


networks:
  ai-network:
    driver: bridge
