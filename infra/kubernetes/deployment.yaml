apiVersion: apps/v1
kind: Deployment
metadata: 
  name: ai-backend
  labels:
    app:  ai-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-backend
  template:
    metadata:
      labels:
        app: ai-backend
    spec: 
      containers:
      - name: backend
        image: ai-platform:backend-latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom: 
            secretKeyRef:
              name: ai-secrets
              key: database-url
        - name: REDIS_URL
          value: "redis://redis:6379/0"
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits: 
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: v1
kind:  Service
metadata:
  name:  ai-backend
spec:
  selector:
    app: ai-backend
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
  type: LoadBalancer